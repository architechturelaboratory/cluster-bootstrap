name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-yaml:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              line-length:
                max: 150
              truthy:
                allowed-values: ['true', 'false']

  validate-manifests:
    name: Kubernetes manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Validate Kubernetes manifests
        run: |
          find . -name "*.yaml" \
            -not -path "./.github/*" \
            -not -path "./bootstrap/secrets/*" \
            | xargs kubeconform \
              -strict \
              -ignore-missing-schemas \
              -kubernetes-version 1.29.0 \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

  helm-lint:
    name: Helm values lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint cert-manager values
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm lint --values addons/cert-manager/values.yaml \
            $(helm pull jetstack/cert-manager --untar --untardir /tmp/charts 2>/dev/null; echo /tmp/charts/cert-manager) || true

      - name: Lint ingress-nginx values
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm lint --values addons/ingress-nginx/values.yaml \
            $(helm pull ingress-nginx/ingress-nginx --untar --untardir /tmp/charts 2>/dev/null; echo /tmp/charts/ingress-nginx) || true
