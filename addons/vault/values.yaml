global:
  enabled: true

server:
  # Dev mode'da veriler bellekte tutulur, restart'ta sıfırlanır.
  # Persistent storage ekleyerek dev mode'da bile verileri koruyoruz.
  dev:
    enabled: true
    devRootToken: "root"

  dataStorage:
    enabled: true
    size: 1Gi
    storageClass: local-path
    mountPath: "/vault/data"

  # Dev mode'da storage config (config.hcl) ekleyelim
  extraConfig: |
    ui = true
    storage "file" {
      path = "/vault/data"
    }
  replicas: 1

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - host: vault.dev.local
        paths:
          - /
    tls:
      - secretName: vault-tls
        hosts:
          - vault.dev.local
    annotations:
      cert-manager.io/cluster-issuer: selfsigned-issuer

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Dev mode'da storage config gerekmez.
  # Production için şu bloğu aç:
  # dataStorage:
  #   enabled: true
  #   size: 5Gi
  #   storageClass: local-path

# UI'yi aç — vault.dev.local üzerinden erişilebilir
ui:
  enabled: true

# HA kapalı — dev için tek node yeterli
ha:
  enabled: false

# Vault Agent Injector — pod'lara otomatik secret inject eder
# ESO kullandığımız için buna gerek yok, kapalı
injector:
  enabled: false
