controller:
  replicaCount: 1

  # ssl-passthrough — ArgoCD kendi TLS'ini yönetir
  extraArgs:
    enable-ssl-passthrough: ""

  ingressClassResource:
    name: nginx
    enabled: true
    default: true

  # k3d ile NodePort kullan
  # k3d cluster create --port "80:30080@loadbalancer" --port "443:30443@loadbalancer"
  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443

  # Dev için tek node'da çalışacak şekilde
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Prometheus metriklerini aç
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring

  config:
    # Dev log level
    error-log-level: warn
    use-forwarded-headers: "true"

defaultBackend:
  enabled: false
