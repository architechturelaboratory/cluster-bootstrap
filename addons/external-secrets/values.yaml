replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

webhook:
  replicaCount: 1

certController:
  replicaCount: 1

# Prometheus metrikleri
serviceMonitor:
  enabled: true
  namespace: monitoring

---
# Vault'u backend olarak kullanan ClusterSecretStore
# ESO bu store üzerinden Vault'a bağlanır
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  annotations:
    # Vault hazır olduktan sonra oluşsun
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"        # Vault'ta kullanılacak secrets engine path'i
      version: "v2"         # KV secrets engine versiyonu
      auth:
        tokenSecretRef:
          name: vault-token  # Bu secret'ı aşağıda oluşturuyoruz
          key: token
          namespace: external-secrets
# Kubernetes İç DNS Mantığı
# Kubernetes her service için otomatik DNS üretir.
# Format genelde: <service-name>.<namespace>.svc.cluster.local
---
# Vault root token'ını ESO'nun okuyabileceği bir secret olarak sakla
# DEV ONLY — production'da AppRole veya Kubernetes auth kullan
apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: external-secrets
type: Opaque
stringData:
  token: "root"   # values.yaml'daki devRootToken ile eşleşmeli