# Vault'u backend olarak kullanan ClusterSecretStore
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"        # Vault'ta kullanılacak secrets engine path'i
      version: "v2"         # KV secrets engine versiyonu
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
          namespace: external-secrets
---
# Vault root token'ını ESO'nun okuyabileceği bir secret olarak sakla
# DEV ONLY — production'da AppRole veya Kubernetes auth kullan
apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: external-secrets
type: Opaque
stringData:
  token: "root"   # vault values.yaml'daki devRootToken ile eşleşmeli
