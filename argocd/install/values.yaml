global:
  domain: argocd.dev.local

server:
  replicas: 1
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - argocd.dev.local
    tls:
      - secretName: argocd-server-tls
        hosts:
          - argocd.dev.local
    annotations:
      cert-manager.io/cluster-issuer: selfsigned-issuer
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
configs:
  params:
    server.insecure: true
  cm:
    # k3s local dev — kısa sync intervalleri
    timeout.reconciliation: 30s
    application.instanceLabelKey: argocd.argoproj.io/app-name

repoServer:
  replicas: 1

applicationSet:
  replicas: 1

redis:
  enabled: true

# Dev ortamı için küçük resource limitleri
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
