apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Platform-level cluster addons

  # Bu proje yalnızca kendi cluster'ına deploy edebilir
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "*"

  # Kaynak olarak yalnızca bu repo ve güvenilir Helm repo'ları
  sourceRepos:
    - https://github.com/architechturelaboratory/cluster-bootstrap.git  # <-- değiştir
    - https://charts.jetstack.io
    - https://kubernetes.github.io/ingress-nginx
    - https://prometheus-community.github.io/helm-charts
    - https://charts.external-secrets.io

  # Platform proje'si her CRD'yi ve cluster-level kaynağı yönetebilir
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
